version: '3.9 '

services:
  postgres:
  image: postgres:16
  container_name: etl_postgres  
  restart: always
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    POSTGRES_DB: etl_db
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  etl_app:
    build: .
    container_name: etl_python_app
    depends_on:
      - postgres
    environment:
      - API_BASE_URL= hhtp://

