version: '3.8'

# =========================================================
# ESPM - Data Integration - Semana 10
# Docker Compose: Airflow Standalone + PostgreSQL
# =========================================================

services:
  # --------------------------------------------------
  # PostgreSQL — banco de destino do ETL
  # --------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: etl_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 5s
      retries: 5

  # --------------------------------------------------
  # Apache Airflow — standalone (webserver + scheduler)
  # --------------------------------------------------
  airflow:
    image: apache/airflow:2.9.3-python3.11
    container_name: airflow_standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      # Variáveis para a DAG acessar o PostgreSQL de destino
      ETL_DB_HOST: postgres
      ETL_DB_PORT: "5432"
      ETL_DB_USER: etl_user
      ETL_DB_PASS: etl_pass
      ETL_DB_NAME: etl_db
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow standalone
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  airflow_logs:
